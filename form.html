<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="https://www.google.com/search">
        <input type="name" id="user" name="q" placeholder="search in google">
        <button>search</button>
    </form>
    <hr>
    <h1>Registration Form</h1>
    <form action="/action">
        <div>
            <input type="text" placeholder="First Name" id="FirstName" name="FN">
            <input type="text" placeholder="Last Name" id="LastName" name="LN">
        
        </div>
        <div>
            <label for="gender">Please select gender</label>
            <select name="gender" id="gender">
                <option value="m">Male</option>
                <option value="f">Female</option>
                <option value="o">Others</option>
            </select>
        </div>
        <div>
            Do yo agree to all terms of service?
            <input type="checkbox" id="agree" name="agree">
            <label for="agree">Yes, I agree</label>
        </div>
        <button>Register</button>
    </form>
    <hr>

    <form action="/action">
        <div>
        <label for="name">Name</label>
        <input type="text"  name="name">
        </div>
        <div>
            <label for="sex">sex:</label>
            <label for="sex">Male</label>
            <input id="sex" type="radio" name="sex" value="m">
            <label for="sex">Female</label>
            <input id="sex" type="radio" name="sex" value="f">
        </div>
        <div>
            <label for="country">Country: </label>
            <select id="country" name="country">
                <option>Select an option</option>
                <option value="in">India</option>
                <option value="usa">USA</option>
                <option value="jap">Japan</option>
            </select>
        </div>
        <div>
            <label for="message">Message: </label>
            <textarea name="message" id="message"></textarea>
        </div>
        <input type="checkbox" name="sub" id="sub">
        <label for="sub">Subscribe?</label>
        <br>
        <button>submit</button>
    </form>
</body>
</html>
